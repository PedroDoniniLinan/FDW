version: 2

models:
  - name: stg_balances__extracts
    description: "Extracts taken periodically from accounts for validation purposes with units for each asset."
    columns:
      - name: extract_id
        data_type: uuid
        description: "{{ doc('extract_id') }}"
        tests:
          - not_null
          - unique
      - name: account
        data_type: character varying
        description: "{{ doc('account') }}"
        tests:
          - relationships:
              to: ref('dim_account')
              field: account
          - not_null
      - name: asset
        data_type: character varying
        description: "{{ doc('asset') }}"
        tests:
          - not_null
      - name: calendar_date
        data_type: date
        description: "{{ doc('calendar_date') }}"
        tests:
          - not_null
      - name: units
        data_type: double precision
        description: "{{ doc('units') }}"
        tests:
          - not_null

  - name: stg_balances__assets
    description: "Distinct assets owned at any time"
    columns:
      - name: asset_id
        data_type: uuid
        description: "{{ doc('asset_id') }}"
        tests:
          - not_null
          - unique
      - name: asset
        data_type: character varying
        description: "{{ doc('asset') }}"
        tests:
          - not_null

  - name: stg_balances__last_update
    description: "Support model to track last update date for balances data, indicating last manual input"
    columns:
      - name: last_update
        data_type: date
        description: "Last update date for balances data, indicating last manual input"
        tests:
          - not_null
          - unique


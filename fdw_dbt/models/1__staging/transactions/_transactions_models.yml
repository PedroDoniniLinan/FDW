version: 2

models:
  - name: stg_transactions__exchanges
    description: "Staged exchange transactions representing asset trades, including the exchanged asset, rate, and any taxes paid."
    config:
      tags: ['refactored', 'main', 'balance_validation']
    columns:
      - name: transaction_id
        data_type: uuid
        description: "{{ doc('transaction_id') }}"
        tests:
          - not_null
          - unique
      - name: transaction_type
        data_type: text
        description: "{{ doc('transaction_type') }}"
        tests:
          - not_null
      - name: transaction_description
        data_type: text
        description: "{{ doc('transaction_description') }}"
        tests:
          - not_null
      - name: units
        data_type: double precision
        description: "{{ doc('units') }}"
      - name: account
        data_type: character varying
        description: "{{ doc('account') }}"
        tests:
          - not_null
      - name: calendar_date
        data_type: date
        description: "{{ doc('calendar_date') }}"
        tests:
          - not_null
      - name: category
        data_type: character varying
        description: "{{ doc('category') }}"
        tests:
          - not_null
      - name: asset
        data_type: character varying
        description: "{{ doc('asset') }}"
        tests:
          - not_null
      - name: count_to_balance
        data_type: boolean
        description: "{{ doc('count_to_balance') }}"
        tests:
          - not_null
      - name: exchange_asset
        data_type: character varying
        description: "{{ doc('exchange_asset') }}"
        tests:
          - not_null
      - name: exchange_rate
        data_type: double precision
        description: "{{ doc('exchange_rate') }}"
      - name: tax_asset
        data_type: character varying
        description: "{{ doc('tax_asset') }}"
        tests:
          - not_null
      - name: tax_units
        data_type: double precision
        description: "{{ doc('tax_units') }}"

  - name: stg_transactions__external
    description: "Staged income and expense transactions representing cash inflows and outflows across accounts."
    config:
      tags: ['refactored', 'main', 'balance_validation']
    columns:
      - name: transaction_id
        data_type: uuid
        description: "{{ doc('transaction_id') }}"
        tests:
          - not_null
          - unique
      - name: transaction_type
        data_type: character varying
        description: "{{ doc('transaction_type') }}"
        tests:
          - not_null
      - name: transaction_description
        data_type: character varying
        description: "{{ doc('transaction_description') }}"
        tests:
          - not_null
      - name: units
        data_type: double precision
        description: "{{ doc('units') }}"
      - name: account
        data_type: character varying
        description: "{{ doc('account') }}"
        tests:
          - not_null
      - name: calendar_date
        data_type: date
        description: "{{ doc('calendar_date') }}"
        tests:
          - not_null
      - name: category
        data_type: character varying
        description: "{{ doc('category') }}"
        tests:
          - not_null
      - name: asset
        data_type: character varying
        description: "{{ doc('asset') }}"
        tests:
          - not_null
      - name: count_to_balance
        data_type: boolean
        description: "{{ doc('count_to_balance') }}"
        tests:
          - not_null

  - name: stg_transactions__internal
    description: "Staged transfer transactions representing movements of funds between accounts."
    config:
      tags: ['refactored', 'main', 'balance_validation'] 
    columns:
      - name: transaction_id
        data_type: uuid
        description: "{{ doc('transaction_id') }}"
        tests:
          - not_null
          - unique
      - name: transaction_type
        data_type: text
        description: "{{ doc('transaction_type') }}"
        tests:
          - not_null
      - name: transaction_description
        data_type: text
        description: "{{ doc('transaction_description') }}"
        tests:
          - not_null
      - name: units
        data_type: double precision
        description: "{{ doc('units') }}"
      - name: account
        data_type: character varying
        description: "{{ doc('account') }}"
        tests:
          - not_null
      - name: calendar_date
        data_type: date
        description: "{{ doc('calendar_date') }}"
        tests:
          - not_null
      - name: category
        data_type: text
        description: "{{ doc('category') }}"
        tests:
          - not_null
      - name: asset
        data_type: character varying
        description: "{{ doc('asset') }}"
        tests:
          - not_null
      - name: count_to_balance
        data_type: boolean
        description: "{{ doc('count_to_balance') }}"
        tests:
          - not_null
version: 2

models:
  - name: stg_projections__transactions
    description: >
      Staging model containing projected future transactions used for financial
      forecasting and planning scenarios. Includes multiple sets of expected
      future income, expenses, investments, and recurring financial events
      normalized into a standardized transaction structure.
    columns:
      - name: transaction_id
        data_type: uuid
        description: "{{ doc ('transaction_id') }}"
        tests:
          - not_null
          - unique
      - name: calendar_date
        data_type: date
        description: "{{ doc ('calendar_date') }}"
        tests:
          - not_null
      - name: simulation_set
        data_type: integer
        description: "{{ doc ('simulation_set') }}"
        tests:
          - not_null
      - name: transaction_type
        data_type: character varying
        description: "{{ doc ('transaction_type') }}"
        tests:
          - not_null
      - name: budget_level_1
        data_type: character varying
        description: "{{ doc ('budget_level_1') }}"
        tests:
          - not_null
      - name: amount
        data_type: double precision
        description: "{{ doc ('amount') }}"

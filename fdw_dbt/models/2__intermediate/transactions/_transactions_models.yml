version: 2

models:
  - name: int_transactions__all
    description: "Intermediate model that unifies historical transactions across all sources (income, expenses, exchanges and internal transfers) into a single, standardized schema for downstream financial and accounting workflows."
    columns:
      - name: transaction_id
        data_type: uuid
        description: "{{ doc('transaction_id') }}"
        tests:
          - not_null
          - unique
      - name: source_transaction_id
        data_type: uuid
        description: "{{ doc('source_transaction_id') }}"
        tests:
          - not_null
      - name: transaction_type
        data_type: text
        description: "{{ doc('transaction_type') }}"
        tests:
          - not_null
      - name: transaction_description
        data_type: text
        description: "{{ doc('transaction_description') }}"
        tests:
          - not_null
      - name: account
        data_type: character varying
        description: "{{ doc('account') }}"
        tests:
          - not_null
      - name: calendar_date
        data_type: date
        description: "{{ doc('calendar_date') }}"
        tests:
          - not_null
      - name: category
        data_type: character varying
        description: "{{ doc('category') }}"
        tests:
          - not_null
      - name: asset
        data_type: character varying
        description: "{{ doc('asset') }}"
        tests:
          - not_null
          - relationships:
              to: ref('stg_investing__rates')
              field: asset
      - name: count_to_balance
        data_type: boolean
        description: "{{ doc('count_to_balance') }}"
        tests:
          - not_null
      - name: units
        data_type: double precision
        description: "{{ doc('units') }}"
        tests:
          - not_null

  - name: int_transactions__fiat_converted
    description: "This table contains fiat currency converted transactions with some relevant details/dimensions."
    columns:
      - name: fiat_transaction_id
        data_type: uuid
        description: "{{ doc('fiat_transaction_id') }}"
        tests:
          - not_null
          - unique
      - name: transaction_id
        data_type: uuid
        description: "{{ doc('transaction_id') }}"
        tests:
          - not_null
      - name: source_transaction_id
        data_type: uuid
        description: "{{ doc('source_transaction_id') }}"
        tests:
          - not_null
      - name: calendar_date
        data_type: date
        description: "{{ doc('calendar_date') }}"
        tests:
          - not_null
      - name: transaction_description
        data_type: text
        description: "{{ doc('transaction_description') }}"
        tests:
          - not_null
      - name: asset
        data_type: character varying
        description: "{{ doc('asset') }}"
        tests:
          - not_null
      - name: currency
        data_type: text
        description: "{{ doc('currency') }}"
        tests:
          - not_null
      - name: transaction_type
        data_type: text
        description: "{{ doc('transaction_type') }}"
        tests:
          - not_null
      - name: category
        data_type: character varying
        description: "{{ doc('category') }}"
        tests:
          - not_null
      - name: account
        data_type: character varying
        description: "{{ doc('account') }}"
        tests:
          - not_null
      - name: units
        data_type: numeric
        description: "{{ doc('units') }}"
        tests:
          - not_null
      - name: exchange_rate
        data_type: numeric
        description: "{{ doc('exchange_rate') }}"
        tests:
          - not_null
      - name: amount
        data_type: numeric
        description: "{{ doc('amount') }}"
        tests:
          - not_null

  - name: int_transactions__all_with_gains
    description: Intermediate transactions model that includes both transaction details and gain metrics, supporting full transaction-level gain analysis and reconciliation.

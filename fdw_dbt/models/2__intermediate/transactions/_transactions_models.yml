        data_type: text
        description: "{{ doc('transaction_type') }}"
        tests:
          - not_null
      - name: transaction_description
        data_type: text
        description: "{{ doc('transaction_description') }}"
        tests:
          - not_null
      - name: account
        data_type: character varying
        description: "{{ doc('account') }}"
        tests:

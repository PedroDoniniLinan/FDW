      - name: exchange_rate
        data_type: numeric
        description: "{{ doc('exchange_rate') }}"
      - name: exchange_rate_delta
        data_type: numeric
        description: "{{ doc('exchange_rate_delta') }}"
      - name: amount
        data_type: numeric
        description: "{{ doc('amount') }}"


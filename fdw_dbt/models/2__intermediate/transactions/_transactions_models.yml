  - name: int_transactions__intraday_gains
    description: Intraday gains model capturing end-of-day transaction value movements, used for short-term trading and intra-period performance analysis.
    columns:
      - name: fiat_transaction_id
        data_type: uuid
        description: "{{ doc('fiat_transaction_id') }}"
        tests:
          - not_null

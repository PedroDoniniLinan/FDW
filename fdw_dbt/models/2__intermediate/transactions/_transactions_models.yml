  - name: int_transactions__dod_gains
    description: Day-over-day gains model tracking asset and currency value changes between consecutive periods, useful for daily PnL and exchange rate movement analysis.
    columns:
      - name: fiat_transaction_id
        data_type: uuid
        description: "{{ doc('fiat_transaction_id') }}"
        tests:
          - not_null

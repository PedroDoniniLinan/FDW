version: 2

models:
  - name: int_balances__daily
    description: "Daily monetary value of asset holdings per account, expressed in fiat currency. Combines holding units with exchange rates to produce balance values across all target currencies."
    config:
      tags: ['refactored', 'main']
    columns:
      - name: balance_id
        data_type: uuid
        description: "{{ doc('balance_id') }}"
        tests:
          - not_null
          - unique
      - name: account
        data_type: character varying
        description: "{{ doc('account') }}"
      - name: asset
        data_type: character varying
        description: "{{ doc('asset') }}"
      - name: currency
        data_type: text
        description: "{{ doc('currency') }}"
      - name: calendar_date
        data_type: date
        description: "{{ doc('calendar_date') }}"
      - name: is_end_of_period
        data_type: text
        description: "{{ doc('is_end_of_period') }}"
      - name: units
        data_type: double precision
        description: "{{ doc('units') }}"
      - name: exchange_rate
        data_type: numeric
        description: "{{ doc('exchange_rate') }}"
      - name: balance
        data_type: double precision
        description: "{{ doc('balance') }}"

  - name: int_holdings__daily
    description: "Daily quantity of each asset held per account. Represents the raw unit position before any monetary conversion, used as the upstream input for balance calculations."
    config:
      tags: ['refactored', 'main']
    columns:
      - name: holding_id
        data_type: uuid
        description: "{{ doc('holding_id') }}"
        tests:
          - not_null
          - unique
      - name: account
        data_type: character varying
        description: "{{ doc('account') }}"
      - name: asset
        data_type: character varying
        description: "{{ doc('asset') }}"
      - name: calendar_date
        data_type: date
        description: "{{ doc('calendar_date') }}"
      - name: is_end_of_period
        data_type: text
        description: "{{ doc('is_end_of_period') }}"
      - name: units
        data_type: double precision
        description: "{{ doc('units') }}"

  - name: int_holdings__extract_latest
    description: "Extracts the latest holdings for each account and asset."
    config:
      tags: ['refactored', 'balance_validation']
    columns:
      - name: extract_id
        data_type: uuid
        description: "{{ doc('extract_id') }}"
        tests:
          - not_null
          - unique
      - name: account
        data_type: character varying
        description: "{{ doc('account') }}"
      - name: asset
        data_type: character varying
        description: "{{ doc('asset') }}"
      - name: calendar_date
        data_type: date
        description: "{{ doc('calendar_date') }}"
      - name: units
        data_type: numeric
        description: "{{ doc('units') }}"

  - name: int_holdings__reconciliation_latest
    description: "Compares the latest extracted holdings with the current calculated holdings to identify discrepancies."
    config:
      tags: ['refactored', 'balance_validation']
    columns:
      - name: extract_id
        data_type: uuid
        description: "{{ doc('extract_id') }}"
        tests:
          - not_null
          - unique
      - name: account
        data_type: character varying
        description: "{{ doc('account') }}"
      - name: asset
        data_type: character varying
        description: "{{ doc('asset') }}"
      - name: calendar_date
        data_type: date
        description: "{{ doc('calendar_date') }}"
      - name: units_actual
        data_type: double precision
        description: "Actual units value extracted from accounts for each asset."
      - name: units_calculated
        data_type: numeric
        description: "Calcualted units value from transactions extracted."
      - name: delta
        data_type: double precision
        description: "Difference betwee units_actual and units_calculated."

  - name: int_holdings__reconciliation
    description: "Compares extracted holdings with calculated holdings for all calendar dates to identify discrepancies."
    config:
      tags: ['refactored', 'balance_validation']
    columns:
      - name: extract_id
        data_type: uuid
        description: "{{ doc('extract_id') }}"
        tests:
          - not_null
          - unique
      - name: account
        data_type: character varying
        description: "{{ doc('account') }}"
      - name: asset
        data_type: character varying
        description: "{{ doc('asset') }}"
      - name: calendar_date
        data_type: date
        description: "{{ doc('calendar_date') }}"
      - name: units_actual
        data_type: double precision
        description: "Actual units value extracted from accounts for each asset."
      - name: units_calculated
        data_type: numeric
        description: "Calcualted units value from transactions extracted."
      - name: delta
        data_type: double precision
        description: "Difference betwee units_actual and units_calculated."

  - name: int_holdings__unfiltered
    description: "Unfiltered view of daily holdings with cumulative units (Includes also transactions that are not reported on)."
    config:
      tags: ['refactored', 'balance_validation']
    columns:
      - name: holding_id
        data_type: uuid
        description: "{{ doc('holding_id') }}"
        tests:
          - not_null
          - unique
      - name: account
        data_type: character varying
        description: "{{ doc('account') }}"
      - name: asset
        data_type: character varying
        description: "{{ doc('asset') }}"
      - name: calendar_date
        data_type: date
        description: "{{ doc('calendar_date') }}"
      - name: is_end_of_period
        data_type: text
        description: "{{ doc('is_end_of_period') }}"
      - name: units
        data_type: numeric
        description: "{{ doc('units') }}"



version: 2

models:
  - name: int_balances__daily
    tags: ['refactored', 'main']
    description: "Daily monetary value of asset holdings per account, expressed in fiat currency. Combines holding units with exchange rates to produce balance values across all target currencies."
    columns:
      - name: balance_id
        data_type: uuid
        description: "{{ doc('balance_id') }}"
      - name: account
        data_type: character varying
        description: "{{ doc('account') }}"
      - name: asset
        data_type: character varying
        description: "{{ doc('asset') }}"
      - name: currency
        data_type: text
        description: "{{ doc('currency') }}"
      - name: calendar_date
        data_type: date
        description: "{{ doc('calendar_date') }}"
      - name: is_end_of_period
        data_type: text
        description: "{{ doc('is_end_of_period') }}"
      - name: units
        data_type: double precision
        description: "{{ doc('units') }}"
      - name: exchange_rate
        data_type: numeric
        description: "{{ doc('exchange_rate') }}"
      - name: balance
        data_type: double precision
        description: "{{ doc('balance') }}"

  - name: int_holdings__daily
    tags: ['refactored', 'main', 'balance_validation']
    description: "Daily quantity of each asset held per account. Represents the raw unit position before any monetary conversion, used as the upstream input for balance calculations."
    columns:
      - name: holding_id
        data_type: uuid
        description: "{{ doc('holding_id') }}"
      - name: account
        data_type: character varying
        description: "{{ doc('account') }}"
      - name: asset
        data_type: character varying
        description: "{{ doc('asset') }}"
      - name: calendar_date
        data_type: date
        description: "{{ doc('calendar_date') }}"
      - name: is_end_of_period
        data_type: text
        description: "{{ doc('is_end_of_period') }}"
      - name: units
        data_type: double precision
        description: "{{ doc('units') }}"
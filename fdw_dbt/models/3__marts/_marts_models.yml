      - name: income_work
        data_type: numeric
        description: "{{ doc('income_work') }}"
      - name: income_investments
        data_type: numeric
        description: "{{ doc('income_investments') }}"
      - name: expenses_essentials
        data_type: numeric
        description: "{{ doc('expenses_essentials') }}"

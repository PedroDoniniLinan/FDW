      - name: calendar_date
        data_type: date
        description: "{{ doc('calendar_date') }}"
      - name: transaction_description
        data_type: text
        description: "{{ doc('transaction_description') }}"
      - name: asset
        data_type: character varying
        description: "{{ doc('asset') }}"
      - name: currency
        data_type: text
        description: "{{ doc('currency') }}"
      - name: transaction_type
        data_type: text
        description: "{{ doc('transaction_type') }}"
      - name: category
        data_type: character varying
        description: "{{ doc('category') }}"
      - name: financial_level_1
        data_type: text
        description: "{{ doc('financial_level_1') }}"
      - name: financial_level_2
        data_type: text
        description: "{{ doc('financial_level_2') }}"
      - name: budget_level_1
        data_type: text
        description: "{{ doc('budget_level_1') }}"
      - name: budget_level_2
        data_type: text
        description: "{{ doc('budget_level_2') }}"
      - name: budget_level_3
        data_type: text
        description: "{{ doc('budget_level_3') }}"
      - name: account

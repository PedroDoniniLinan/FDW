version: 2
models:
  - name: test
    description: "A test table with basic data types"
    columns:
      - name: id
        description: "Primary key of the table"
        constraints:
          - type: not_null
          - type: primary_key
        tests:
          - unique
          - not_null
      - name: name
        description: "Name field"
        tests:
          - not_null
      - name: age
        description: "Age field"
        tests:
          - not_null
          - dbt_utils.positive_value
fdw_dbt:
  config:
    send_anonymous_usage_stats: false
  target: "{{ env_var('DBT_TARGET', 'prod') }}"
  outputs:
    prod:
      type: postgres
      host: "{{ env_var('DB_HOST') }}"
      user: "{{ env_var('DB_USER') }}"
      password: "{{ env_var('DB_PASSWORD') }}"
      database: "{{ env_var('DB_DATABASE') }}"
      schema: silver
      port: 5433
    dev:
      type: postgres
      host: "{{ env_var('DB_HOST') }}"
      user: "{{ env_var('DB_USER') }}"
      password: "{{ env_var('DB_PASSWORD') }}"
      database: "{{ env_var('DB_DATABASE_DEV') }}"
      schema: silver
      port: 5433

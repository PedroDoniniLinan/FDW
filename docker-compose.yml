services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: donini
      POSTGRES_PASSWORD: donini
      POSTGRES_DB: prod
      PGDATA: /var/lib/postgresql/data/pgdata  # Explicitly define data directory
    ports:
      - "5433:5432"
    volumes:
      - ~/postgres_data:/var/lib/postgresql/data
